name: amani_ai
description: "Amani AI — Find Peace. Gain Clarity. Grow Forward."
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: '>=2.5.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: any
  flutter_riverpod: any

  # Firebase
  firebase_core: any
  firebase_analytics: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  firebase_messaging: any
  google_sign_in: any

  # Networking & utils
  dio: any
  http: any
  flutter_secure_storage: any
  uuid: any

  # Voice
  speech_to_text: any
  flutter_tts: any

  # UI
  animations: any
  go_router: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
