name: Emulator Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  emulators-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Install functions deps
        run: |
          cd functions
          npm ci

      - name: Start Firebase emulators
        run: |
          nohup npx firebase emulators:start --only firestore,functions --project demo-project &
          # wait for functions emulator to be available
          for i in {1..60}; do
            if curl -sS "http://localhost:5001/" >/dev/null 2>&1; then
              echo "Functions emulator is up"; break
            fi
            echo "Waiting for emulator... ($i)"; sleep 1
          done

      - name: Run integration test
        env:
          FUNCTIONS_EMULATOR_HOST: http://localhost:5001
          FIRESTORE_EMULATOR_HOST: localhost:8080
          GCLOUD_PROJECT: demo-project
        run: |
          node functions/integration_test.js

      - name: Stop emulators
        if: always()
        run: |
          # kill the firebase emulator process
          ps aux | grep 'firebase emulators:start' | grep -v grep | awk '{print $2}' | xargs -r kill || true
